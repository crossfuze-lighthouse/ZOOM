  <style>

      font-family: 'Source Sans 3', sans-serif;

      padding: 4px 10px;

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

</head>
<body class="min-h-screen text-white">
  <div id="app"></div>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [page, setPage] = useState("exec");
      const [actionChecked, setActionChecked] = useState({});
      const [actionExpanded, setActionExpanded] = useState({});
      const [actionExpandedItem, setActionExpandedItem] = useState(null);

      // Quarter badge helper
      const QtrBadge = ({ quarter, status }) => {
        const s = {
          complete: "border-[#8FFFDB]/28 bg-[#8FFFDB]/10 text-[#8FFFDB]",
          active:   "border-[#71F1F7]/28 bg-[#71F1F7]/10 text-[#71F1F7]",
          upcoming: "border-[#C0A6FF]/22 bg-[#C0A6FF]/8 text-[#C0A6FF]",
        }[status];
        const lbl = { complete: "✓ Done", active: "Active", upcoming: "Upcoming" }[status];
        return (
          <div className="flex items-center gap-1.5 shrink-0">
            <span className={`inline-flex items-center rounded-full border px-2.5 py-0.5 text-[9px] font-bold uppercase tracking-[0.2em] ${s}`}>{quarter}</span>
            <span className={`inline-flex items-center rounded-full border px-2 py-0.5 text-[9px] font-bold uppercase tracking-[0.14em] ${s}`}>{lbl}</span>
          </div>
        );
      };

      const actionSections = [
        { id:"assess",   number:"01", quarter:"Q1",     quarterStatus:"complete", title:"Assess current search readiness",       goal:"Understand how Crossfuze currently appears across traditional and AI-powered search so visibility gaps can be prioritised.", items:[{id:"a1",text:"Identify top customer questions across the buying journey",detail:"Use sales calls, support tickets, community discussions, SERP features, and query data to surface the real questions buyers ask."},{id:"a2",text:"Audit Crossfuze visibility in AI search results",detail:"Review Google AI Overviews, ChatGPT, Perplexity, and Gemini to see what content surfaces, who is cited, and where Crossfuze is absent."},{id:"a3",text:"Evaluate how AI answers portray Crossfuze",detail:"Check branded queries to confirm that AI tools surface accurate, consistent information about Crossfuze and its ServiceNow capabilities."},{id:"a4",text:"Identify citation share in priority queries",detail:"Assess where Crossfuze already appears and which pages are best placed to win more AI citation."},{id:"a5",text:"Evaluate technical readiness for AI extraction",detail:"Check whether page structure, markup, and accessibility make the site easy for AI systems to crawl, interpret, and extract from."}] },
        { id:"strategy", number:"02", quarter:"Q1–Q2", quarterStatus:"active",   title:"Define the AEO strategy",              goal:"Translate priority topics, audiences, and intent into a repeatable AEO plan aligned to commercial goals.", items:[{id:"s1",text:"Identify priority ServiceNow topics for AI search",detail:"Focus on the areas where Crossfuze can demonstrate distinctive, authoritative expertise."},{id:"s2",text:"Map target queries to audience intent stages",detail:"Organise questions by awareness, consideration, and decision so content can support the full buyer journey."},{id:"s3",text:"Choose where and how authority will be strengthened",detail:"Prioritise proof signals such as customer stories, expert commentary, original insight, partnerships, and third-party validation."},{id:"s4",text:"Define how success will be measured",detail:"Set a repeatable review cadence for visibility, citation presence, benchmark movement, and downstream engagement."}] },
        { id:"content",  number:"03", quarter:"Q2",     quarterStatus:"active",   title:"Optimise content for AI engines",       goal:"Structure and write content so it is easy for AI to parse and easy for buyers to trust.", items:[{id:"c1",text:"Add concise, factual summaries",detail:"Lead sections with direct answers before expanding with supporting detail."},{id:"c2",text:"Front-load answers using BLUF",detail:"Use Bottom Line Up Front so key takeaways appear immediately."},{id:"c3",text:"Create self-contained, clearly labelled sections",detail:"Make subtopics work independently with descriptive headings and standalone summaries that AI can cite."},{id:"c4",text:"Break information into scannable formats",detail:"Use FAQs, bullets, lists, tables, and short paragraphs to improve readability and extractability."},{id:"c5",text:"Strengthen E-E-A-T signals",detail:"Add author proof, cited sources, credentials, and original data where possible."},{id:"c6",text:"Update headlines and metadata for clarity",detail:"Use precise, descriptive titles aligned with natural-language buyer questions."},{id:"c7",text:"Reinforce semantic relevance with internal linking",detail:"Connect related pages to strengthen topic clusters and entity associations."}] },
        { id:"technical",number:"04", quarter:"Q1",     quarterStatus:"complete", title:"Strengthen the technical foundation",   goal:"Ensure the website has the technical structure AI systems need to read, index, and trust it.", items:[{id:"t1",text:"Ensure the site is crawlable and indexable",detail:"Verify that sitemaps, robots instructions, and priority pages allow AI engines to access the right content."},{id:"t2",text:"Use structured content models",detail:"Organise CMS collections, tagging, and page types to reinforce topics and relationships."},{id:"t3",text:"Implement canonicals and avoid duplicate-intent overlap",detail:"Use canonical tags and clean architecture to reduce ambiguity for search and AI crawlers."},{id:"t4",text:"Use schema markup",detail:"Expand structured data so AI engines can interpret services, entities, breadcrumbs, and supporting content correctly."}] },
        { id:"trust",    number:"05", quarter:"Q2–Q3", quarterStatus:"upcoming", title:"Enhance trust and authority signals",    goal:"Increase the credibility cues AI relies on when selecting authoritative answers.", items:[{id:"tr1",text:"Add clear author attribution and expertise proof points",detail:"Include bios, credentials, and relevant experience to demonstrate subject matter expertise."},{id:"tr2",text:"Cite original research, case studies, or data",detail:"Use proprietary insight, internal data, and customer evidence to give AI engines concrete proof to reference."},{id:"tr3",text:"Encourage high-quality third-party mentions and backlinks",detail:"Strengthen credibility through trusted sites and communities that validate Crossfuze expertise."},{id:"tr4",text:"Maintain consistent brand information across external references",detail:"Ensure company description, boilerplate, and key facts stay accurate across partner, directory, and media sources."},{id:"tr5",text:"Demonstrate freshness signals",detail:"Use visible update dates, refresh key pages regularly, and cite primary sources."}] },
        { id:"monitor",  number:"06", quarter:"Q2+",    quarterStatus:"upcoming", title:"Monitor, measure, and iterate",          goal:"Create an ongoing feedback loop so Crossfuze can track where it appears in AI-driven search and improve continuously.", items:[{id:"m1",text:"Set up AEO tracking dashboards",detail:"Track brand visibility, share of voice, LLM-referred traffic, and conversions to establish reporting baselines."},{id:"m2",text:"Re-optimise content quarterly based on performance",detail:"Set a regular cadence to update content structure, schema, headers, and internal links based on results."},{id:"m3",text:"Understand how AI systems explore related questions",detail:"Review related questions and subtopics used by AI systems to identify content gaps and prioritise effort."},{id:"m4",text:"Monitor how LLMs evolve",detail:"Track major model changes so movement in AI visibility can be interpreted accurately in reporting."}] },
      ];

      const totalItems = actionSections.reduce((a,s)=>a+s.items.length,0);
      const checkedCount = Object.values(actionChecked).filter(Boolean).length;
      const progress = Math.round((checkedCount/totalItems)*100)||0;
      const progressLabel = progress===0?"Not started":progress<25?"Early stages":progress<50?"In progress":progress<75?"Building momentum":progress<100?"Almost there":"Execution ready";
      const sectionProgress = (s)=>({ done:s.items.filter(i=>actionChecked[i.id]).length, total:s.items.length });

      const stages = [
        {level:1,internal:"Ad Hoc",      name:"Keywords", meaning:"Basic search visibility with minimal AI discoverability"},
        {level:2,internal:"Developing",  name:"Answers",  meaning:"Content answers relevant questions but lacks full authority"},
        {level:3,internal:"Standardized",name:"Structure",meaning:"AI-readable content, schema, and semantic clarity"},
        {level:4,internal:"Advanced",    name:"Pillar",   meaning:"Strong topical authority with growing AI citation"},
        {level:5,internal:"Best-In-Class",name:"Authority",meaning:"Trusted, cited, and recommended in AI discovery"},
      ];

      const dimensions = [
        { title:"Technical Maturity",  score:3.5, label:"Standardized", trend:"↑", trendColor:"text-[#8FFFDB]",
          accent:"from-[#F65275] via-[#6400EC] via-[#2CB0CD] via-[#71F1F7] to-[#8FFFDB]", border:"border-[#71F1F7]/22", text:"text-[#71F1F7]", dot:"bg-[#71F1F7]",
          panelTint:"bg-[#71F1F7]/[0.04]", pillTint:"bg-[#71F1F7]/[0.08]", miniTint:"bg-[#71F1F7]/[0.05]",
          items:[{label:"HTTPS enforcement",score:5},{label:"Canonical structure",score:5},{label:"Structured data rollout",score:4},{label:"Semantic hierarchy",score:3}],
          summary:"Crossfuze now has the technical foundation required for AI discoverability. Search engines and answer engines can recognise the organisation, interpret priority services, and understand the structure of core solution pages.",
          completed:["HTTPS enforced across all site variants","Canonical domain validated","Organization + WebSite schema implemented","Service + Breadcrumb schema added to key pages","Article schema deployed on insight content"] },
        { title:"Content Maturity",    score:2.8, label:"Developing",   trend:"→", trendColor:"text-white/30",
          accent:"from-[#F65275] via-[#6400EC] via-[#2CB0CD] via-[#71F1F7] to-[#8FFFDB]", border:"border-[#2CB0CD]/22", text:"text-[#71F1F7]", dot:"bg-[#2CB0CD]",
          panelTint:"bg-[#2CB0CD]/[0.04]", pillTint:"bg-[#2CB0CD]/[0.08]", miniTint:"bg-[#2CB0CD]/[0.05]",
          items:[{label:"Core service coverage",score:4},{label:"Answer-led structure",score:2},{label:"FAQ readiness",score:2},{label:"Insight-to-service linkage",score:3}],
          summary:"Coverage exists across core services and solution areas, but answer-focused formatting is still uneven. The next step is to make content easier for AI systems to summarise, compare, and cite.",
          completed:["Core service pages clearly define offerings","ServiceNow solution pages expanded","Blog content linked to publisher entity"] },
        { title:"Authority Maturity",  score:2.6, label:"Developing",   trend:"→", trendColor:"text-[#F65275]/70",
          accent:"from-[#F65275] via-[#6400EC] via-[#2CB0CD] via-[#71F1F7] to-[#8FFFDB]", border:"border-[#F65275]/30", text:"text-[#F65275]", dot:"bg-[#F65275]",
          panelTint:"bg-[#F65275]/[0.05]", pillTint:"bg-[#F65275]/[0.08]", miniTint:"bg-[#F65275]/[0.05]",
          items:[{label:"Topical authority",score:3},{label:"External citation signals",score:2},{label:"Industry proof points",score:2},{label:"Thought leadership depth",score:3}],
          summary:"Crossfuze is now structurally understandable, but not yet consistently cited as a trusted source. Moving from Structure to Pillar will depend on stronger authority signals, industry content, and clearer proof of expertise.",
          completed:["Organisation entity now clearly defined","Service expertise explicitly mapped","Foundation laid for stronger insight-led authority"] },
        { title:"Measurement Maturity",score:2.5, label:"Developing",   trend:"→", trendColor:"text-white/30",
          accent:"from-[#F65275] via-[#6400EC] via-[#2CB0CD] via-[#71F1F7] to-[#8FFFDB]", border:"border-[#2CB0CD]/22", text:"text-[#2CB0CD]", dot:"bg-[#2CB0CD]",
          panelTint:"bg-[#2CB0CD]/[0.04]", pillTint:"bg-[#2CB0CD]/[0.08]", miniTint:"bg-[#2CB0CD]/[0.05]",
          items:[{label:"Baseline assessment",score:4},{label:"Competitor benchmarking",score:2},{label:"AI citation tracking",score:2},{label:"Reporting cadence",score:2}],
          summary:"Crossfuze has completed the initial AEO assessment and technical reassessment, but ongoing measurement is still immature. Formal tracking of citations, answer visibility, and competitive share of AI discovery is the next step.",
          completed:["Q1 FY26 AEO assessment completed","Baseline maturity position established","Post-implementation reassessment completed"] },
      ];

      const peer = {
        chatgpt:[{rank:1,company:"Crossfuze",score:48,highlight:true},{rank:2,company:"FlyForm",score:44},{rank:3,company:"Kaptius",score:42},{rank:4,company:"Pulsar",score:39},{rank:5,company:"UP3",score:38},{rank:6,company:"Intelibliss",score:35},{rank:6,company:"Konversational",score:35},{rank:8,company:"AFJ",score:34}],
        perplexity:[{rank:1,company:"UP3",score:67},{rank:2,company:"Pulsar",score:62},{rank:2,company:"Kaptius",score:62},{rank:4,company:"Konversational",score:60},{rank:5,company:"Crossfuze",score:57,highlight:true},{rank:5,company:"FlyForm",score:57},{rank:7,company:"Intelibliss",score:43},{rank:8,company:"AFJ",score:37}],
        gemini:[{rank:1,company:"Crossfuze",score:49,highlight:true},{rank:2,company:"FlyForm",score:47},{rank:2,company:"Intelibliss",score:47},{rank:2,company:"Konversational",score:47},{rank:5,company:"Pulsar",score:46},{rank:6,company:"Kaptius",score:45},{rank:7,company:"UP3",score:43},{rank:7,company:"AFJ",score:43}],
      };
      const enterprise = {
        chatgpt:[{rank:1,company:"Deloitte",score:82},{rank:2,company:"Capgemini",score:76},{rank:3,company:"Cognizant",score:71},{rank:4,company:"Crossfuze",score:48,highlight:true}],
        perplexity:[{rank:1,company:"Deloitte",score:85},{rank:2,company:"Capgemini",score:78},{rank:3,company:"Cognizant",score:74},{rank:4,company:"Crossfuze",score:57,highlight:true}],
        gemini:[{rank:1,company:"Deloitte",score:75},{rank:2,company:"Capgemini",score:71},{rank:3,company:"Cognizant",score:62},{rank:4,company:"Crossfuze",score:49,highlight:true}],
      };
      const platformMeta = { chatgpt:{label:"ChatGPT",accent:"AI Answer Visibility"}, perplexity:{label:"Perplexity",accent:"AI Discovery Strength"}, gemini:{label:"Gemini",accent:"Search + Answer Presence"} };

      // ── NAV ────────────────────────────────────────────────────────────────
      const nb = (active) => `inline-flex min-h-[42px] items-center justify-center whitespace-nowrap rounded-full border px-5 py-2 text-[13px] font-semibold leading-none tracking-[0.01em] transition-all ${active?"border-[#71F1F7]/40 bg-[#71F1F7]/12 text-[#8FFFDB] shadow-[0_0_0_1px_rgba(113,241,247,0.08)]":"border-white/10 bg-white/[0.03] text-white/75 hover:-translate-y-0.5 hover:bg-white/[0.055]"}`;

      const Header = () => (
        <header className="mb-6 px-1 py-3">
          <div className="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between">
            <div className="flex flex-col items-start">
              <img src="https://cdn.prod.website-files.com/66f7a9d0051c2479948b2667/6930bea01a665531afb73e42_Crossfuze%20Logo_Cool%20Navy%20Gradient-p-500.png" alt="Crossfuze" className="h-[38px] w-auto object-contain brightness-0 invert" />
              <div className="mt-1 pl-0.5 text-[10px] font-bold uppercase tracking-[0.38em] text-[#71F1F7]/65">LIGHTHOUSE</div>
            </div>
            <div className="flex flex-wrap items-center gap-2 xl:justify-end">
              <button onClick={()=>setPage("exec")} className={nb(page==="exec")}>Exec Summary</button>
              <button onClick={()=>setPage("overview")} className={nb(page==="overview")}>Maturity Framework</button>
              <button onClick={()=>setPage("framework")} className={nb(page==="framework")}>Maturity Score</button>
              <button onClick={()=>setPage("benchmark")} className={nb(page==="benchmark")}>Competitive Benchmark</button>
              <button onClick={()=>setPage("actions")} className={nb(page==="actions")}>Action Plan</button>
              <a href="https://crossfuze-lighthouse.github.io/ZOOM/" className="inline-flex min-h-[42px] items-center justify-center gap-1.5 whitespace-nowrap rounded-full bg-[#71F1F7] px-5 py-2 text-[13px] font-bold leading-none text-[#040E3D] shadow-[0_8px_24px_rgba(113,241,247,0.28)] hover:-translate-y-0.5 transition-all">
                <svg className="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  {/* Light rays */}
                  <line x1="12" y1="1" x2="12" y2="2.5" opacity="0.6"/>
                  <line x1="8.5" y1="2.2" x2="9.3" y2="3.4" opacity="0.6"/>
                  <line x1="15.5" y1="2.2" x2="14.7" y2="3.4" opacity="0.6"/>
                  {/* Pointed cap */}
                  <path d="M9.5 6 L12 2.5 L14.5 6 Z" fill="currentColor" fillOpacity="0.7" strokeWidth="1"/>
                  {/* Lantern room */}
                  <rect x="9.5" y="6" width="5" height="3" rx="0" fill="currentColor" fillOpacity="0.3" strokeWidth="1"/>
                  {/* Tower — tapered */}
                  <path d="M9.5 9 L8 20 L16 20 L14.5 9 Z" fill="currentColor" fillOpacity="0.15" strokeWidth="1.2"/>
                  {/* Stripes */}
                  <line x1="8.4" y1="13" x2="15.6" y2="13" strokeWidth="1.5" opacity="0.45"/>
                  <line x1="8.1" y1="17" x2="15.9" y2="17" strokeWidth="1.5" opacity="0.45"/>
                  {/* Base */}
                  <line x1="6" y1="20" x2="18" y2="20" strokeWidth="2"/>
                  <line x1="5" y1="22.5" x2="19" y2="22.5" strokeWidth="1.5" opacity="0.6"/>
                </svg>
                Lighthouse
              </a>
            </div>
          </div>
        </header>
      );

      // ── SIGNAL BAR ─────────────────────────────────────────────────────────
      const SignalBar = () => (
        <div className="mb-7 flex flex-wrap items-center gap-2 rounded-2xl border border-[#71F1F7]/20 bg-[#71F1F7]/[0.03] px-5 py-3 backdrop-blur-sm">
          <span className="text-[9px] font-bold uppercase tracking-[0.3em] text-white/28 mr-2">AEO signals</span>
          <div className="h-3.5 w-px bg-white/10 hidden sm:block mr-1" />
          {[
            {dot:"bg-[#8FFFDB]", label:"AEO Score",   val:"2.8 · L3 Standardized", vc:"text-[#8FFFDB]"},
            {dot:"bg-[#8FFFDB]", label:"ChatGPT",     val:"#1 of 8 peers",          vc:"text-[#8FFFDB]"},
            {dot:"bg-[#8FFFDB]", label:"Gemini",      val:"#1 of 8 peers",          vc:"text-[#8FFFDB]"},
            {dot:"bg-[#F65275]", label:"Perplexity",  val:"#5 of 8 peers",          vc:"text-[#F65275]"},
            {dot:"bg-[#F65275]", label:"Market gap",  val:"−34 pts to Deloitte",    vc:"text-[#F65275]"},
            {dot:"bg-[#F65275]", label:"Q2 priority", val:"Authority + Passle",      vc:"text-[#F65275]"},
          ].map(({dot,label,val,vc})=>(
            <div key={label} className="signal-pill">
              <span className={`h-1.5 w-1.5 rounded-full ${dot}`}/>
              <span className="text-[11px] text-white/40">{label}</span>
              <span className={`text-[11px] font-bold ${vc}`}>{val}</span>
            </div>
          ))}
          <div className="ml-auto hidden lg:flex items-center gap-2">
            <div className="signal-pill">
              <span className="text-[11px] text-white/35">Updated</span>
              <span className="text-[11px] font-bold text-white/60">Q1 FY26</span>
            </div>
          </div>
        </div>
      );

      // ── REUSABLE CARD SHELL ─────────────────────────────────────────────────
      const Card = ({children, className=""}) => (
        <div className={`rounded-[28px] border border-white/10 bg-[linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02))] p-6 shadow-[0_22px_56px_rgba(0,0,0,0.22)] ring-1 ring-white/5 backdrop-blur-xl lg:p-7 ${className}`}>{children}</div>
      );

      const SectionLabel = ({children}) => <div className="text-[10px] font-bold uppercase tracking-[0.3em] text-white/45">{children}</div>;
      const H2 = ({children,className=""}) => <h2 className={`mt-2 text-[1.55rem] font-bold leading-tight tracking-tight text-white ${className}`}>{children}</h2>;

      // ── OVERVIEW ────────────────────────────────────────────────────────────
      const OverviewView = () => (
        <div className="py-2 fade-in space-y-6">
          {/* Hero */}
          <div className="relative overflow-hidden rounded-[32px] border border-white/10 bg-[radial-gradient(circle_at_top_left,rgba(113,241,247,0.10),transparent_25%),linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.025))] px-7 py-7 shadow-[0_28px_72px_rgba(0,0,0,0.28)] ring-1 ring-white/5 backdrop-blur-xl md:px-8 md:py-8">
            <div className="grid gap-6 lg:grid-cols-[1.16fr_0.84fr] lg:items-stretch xl:gap-7">
              <div className="flex max-w-[44rem] flex-col">
                <div className="inline-flex self-start rounded-full border border-[#71F1F7]/30 bg-[#71F1F7]/[0.10] px-4 py-2 text-[11px] font-bold uppercase tracking-[0.24em] text-[#71F1F7]">Model + method</div>
                <h1 className="mt-4 text-[2.4rem] font-bold tracking-tight text-white md:text-5xl xl:text-[3.2rem] xl:leading-[1.05]">Crossfuze AEO Maturity Framework</h1>
                <p className="mt-4 text-[15px] leading-7 text-white/68">A simple model for understanding how well Crossfuze can be discovered, interpreted, trusted, and cited by AI search and answer engines.</p>
              </div>
              <div className="grid auto-rows-fr gap-3 sm:grid-cols-2">
                {[
                  ["Dimensions","4",     "Technical, Content, Authority, Measurement","border-[#71F1F7]/25 bg-[#71F1F7]/[0.07]","text-[#71F1F7]", true],
                  ["Stages",   "5",     "Ad Hoc to Best-In-Class",                    "border-[#8FFFDB]/22 bg-[#8FFFDB]/[0.06]","text-[#8FFFDB]", true],
                  ["Scoring",  "Evidence-based", "Assessment inputs plus validated implementation evidence","border-[#2CB0CD]/18 bg-[#2CB0CD]/[0.05]","text-[#2CB0CD]", false],
                  ["Role",     "Reference model","Foundation for scoring, benchmarking, and action planning","border-white/12 bg-white/[0.04]","text-white/80", false],
                ].map(([lbl,val,note,tone,valColor,isNum])=>(
                  <div key={lbl} className={`rounded-[20px] border px-4 py-4 ${tone}`}>
                    <div className="text-[10px] font-bold uppercase tracking-[0.22em] text-white/38">{lbl}</div>
                    <div className={`mt-2 font-bold leading-none ${isNum?"text-[2.8rem]":"text-[1.3rem] leading-tight mt-3"} ${valColor}`}>{val}</div>
                    <div className="mt-2 text-[12px] leading-5 text-white/55">{note}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* 5-stage model */}
          <Card>
            <SectionLabel>Framework structure</SectionLabel>
            <H2 className="text-[26px] lg:text-[32px]">The five-stage maturity model</H2>
            <p className="mt-2 text-sm leading-6 text-white/60">A simple progression from basic discoverability to trusted AI recommendation.</p>
            <div className="mt-5 grid gap-3 xl:grid-cols-5">
              {[["Level 1","Ad Hoc",      "Keywords", "Limited structure and weak AI interpretation.",                       "border-[#F65275]/20 bg-[#F65275]/[0.06]","bg-[#F65275]/70","text-[#F65275]"],
                ["Level 2","Developing",  "Answers",  "Content answers relevant questions but lacks full authority.",         "border-[#C0A6FF]/22 bg-[#C0A6FF]/[0.06]","bg-[#C0A6FF]/70","text-[#C0A6FF]"],
                ["Level 3","Standardized","Structure","AI-readable content, schema, and semantic clarity are in place.",      "border-[#2CB0CD]/26 bg-[#2CB0CD]/[0.07]","bg-[#2CB0CD]/75","text-[#2CB0CD]"],
                ["Level 4","Advanced",    "Pillar",   "Strong topical authority with growing AI citation.",                   "border-[#71F1F7]/26 bg-[#71F1F7]/[0.07]","bg-[#71F1F7]/75","text-[#71F1F7]"],

                  { status:"→", sc:"text-[#71F1F7]", bc:"border-[#71F1F7]/16 bg-[#71F1F7]/[0.06] ring-1 ring-[#71F1F7]/8", area:"Author authority programme", cf:"Passle SME relaunch — structured expert content at scale.", badge:"Q2",    bbc:"border-[#71F1F7]/20 bg-[#71F1F7]/[0.07] text-[#71F1F7]" },
                  { status:"→", sc:"text-[#71F1F7]", bc:"border-[#71F1F7]/16 bg-[#71F1F7]/[0.06] ring-1 ring-[#71F1F7]/8", area:"AI content auditing",        cf:"Quarterly audit of how AI engines describe Crossfuze.",         badge:"Q2",    bbc:"border-[#71F1F7]/20 bg-[#71F1F7]/[0.07] text-[#71F1F7]" },

                ].map(({status,sc,bc,area,cf,badge,bbc})=>(
                  <div key={area} className={`rounded-[14px] border px-4 py-3 flex items-start gap-3 ${bc}`}>
                    <span className={`mt-0.5 text-[12px] font-bold shrink-0 ${sc}`}>{status}</span>

                      <div className="flex items-center justify-between gap-2">
                        <span className="text-[12.5px] font-bold text-white/80">{area}</span>
                        <span className={`shrink-0 text-[8px] font-bold uppercase tracking-[0.14em] rounded-full border px-2 py-0.5 ${bbc}`}>{badge}</span>

                      <div className={`text-[1.4rem] font-bold leading-none ${tc}`}>{score}</div>

                    <div className="h-1.5 overflow-hidden rounded-full bg-white/8">
                      <div className="h-full rounded-full" style={{width:`${(score/max)*100}%`,background:barMid?`linear-gradient(to right,${barStart},${barMid},${barEnd})`:`linear-gradient(to right,${barStart},${barEnd})`}}/>

                {[
                  { n:"1", t:"FAQ schema + answer content",         outcome:"Increases Content score — AI engines surface structured answers.",        q:"Q2",    tc:"text-[#71F1F7]", qc:"border-[#71F1F7]/25 bg-[#71F1F7]/[0.06] text-[#71F1F7]", bc:"border-[#71F1F7]/30 bg-[#71F1F7]/[0.05]" },

      return (
        <div className="min-h-screen bg-[radial-gradient(circle_at_top_left,rgba(113,241,247,0.055),transparent_18%),radial-gradient(circle_at_bottom_right,rgba(143,255,219,0.04),transparent_22%),#040E3D] px-4 py-5 text-white md:px-7 md:py-6 xl:px-12">
          <div className="mx-auto max-w-7xl">
            <Header/>
            {page !== "exec" && <SignalBar/>}
            <div className="mt-6">{CurrentView}</div>

    ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
  </script>
